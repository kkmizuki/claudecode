stages:
  - syntax_check
  - package
  - deploy

variables:
  # Lambdaのエントリーポイントとなるファイル名(このファイルがあるディレクトリを1関数として検出)
  LAMBDA_ENTRY_FILE: "lambda_function.py"
  # アップロード先のS3バケット名(実際の値に変更してください)
  S3_BUCKET: "my-lambda-bucket"
  # S3バケット内のアップロード先プレフィックス(末尾は/で終える)
  S3_PREFIX: "lambda/"
  # zip化したLambdaパッケージの出力先ディレクトリ
  DIST_DIR: "dist"
  # 差分検出のためフルコミット履歴を取得
  GIT_DEPTH: "0"

# Pythonの構文チェック(LAMBDA_ENTRY_FILEが置かれている各ディレクトリの.pyファイルをコンパイルしてエラー検出)
syntax_check:
  stage: syntax_check
  image: python:${PYTHON_VERSION}-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    - |
      for entry in $(find . -name "${LAMBDA_ENTRY_FILE}"); do
        dir=$(dirname "${entry}")
        echo "Checking Python syntax in ${dir}..."
        python -m py_compile $(find "${dir}" -name "*.py")
      done

# 構文チェック成功後、前回コミットと比較して変更があったLambdaディレクトリのみzip化
package:
  stage: package
  image: python:${PYTHON_VERSION}-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  needs:
    - syntax_check
  script:
    - apt-get update -qq && apt-get install -y -qq zip git
    - mkdir -p "${DIST_DIR}"
    - DIST_DIR_ABS="$(pwd)/${DIST_DIR}"
    - |
      LAMBDA_DIRS=$(find . -name "${LAMBDA_ENTRY_FILE}" -exec dirname {} \; | sed 's|^\./||')
      if [ -z "${CI_COMMIT_BEFORE_SHA}" ] || [ "${CI_COMMIT_BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
        echo "比較対象の前回コミットがないため、全Lambdaディレクトリをパッケージします。"
        CHANGED_DIRS="${LAMBDA_DIRS}"
      else
        CHANGED_DIRS=""
        for dir in ${LAMBDA_DIRS}; do
          if [ -n "$(git diff --name-only "${CI_COMMIT_BEFORE_SHA}" "${CI_COMMIT_SHA}" -- "${dir}")" ]; then
            CHANGED_DIRS="${CHANGED_DIRS} ${dir}"
          fi
        done
      fi
      if [ -z "${CHANGED_DIRS}" ]; then
        echo "Lambdaディレクトリに変更がないため、パッケージをスキップします。"
        exit 0
      fi
      for dir in ${CHANGED_DIRS}; do
        name=$(basename "${dir}")
        echo "Packaging ${dir} into ${DIST_DIR}/${name}.zip..."
        (cd "${dir}" && zip -r "${DIST_DIR_ABS}/${name}.zip" .)
      done
  artifacts:
    paths:
      - "${DIST_DIR}/"
    expire_in: 1 hour

# パッケージが作成された(=変更があった)Lambdaのzipのみをすべてアップロード
deploy_to_s3:
  stage: deploy
  image: amazon/aws-cli:2.17.0
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  needs:
    - package
  script:
    - |
      if [ ! -d "${DIST_DIR}" ] || [ -z "$(ls -A "${DIST_DIR}" 2>/dev/null)" ]; then
        echo "アップロード対象がないため、デプロイをスキップします。"
        exit 0
      fi
      for f in "${DIST_DIR}"/*.zip; do
        name=$(basename "${f}")
        echo "Uploading ${name} to s3://${S3_BUCKET}/${S3_PREFIX}${name}..."
        aws s3 cp "${f}" "s3://${S3_BUCKET}/${S3_PREFIX}${name}"
      done
