name: Lambda Deploy

on:
  push:
    branches: [ main ]
  # 手動実行(差分検出をスキップし、検出対象の全Lambdaディレクトリをデプロイ)
  workflow_dispatch: {}

env:
  # Lambdaのエントリーポイントとなるファイル名(このファイルがあるディレクトリを1関数として検出)
  LAMBDA_ENTRY_FILE: lambda_function.py
  # zip化したLambdaパッケージの出力先ディレクトリ
  DIST_DIR: dist
  # アップロード先のS3バケット名・プレフィックス
  S3_BUCKET: kashi-lambda2
  S3_PREFIX: ${{ vars.S3_PREFIX }}
  AWS_REGION: ap-northeast-1

jobs:
  syntax_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION }}
      - name: Check Python syntax
        run: |
          for entry in $(find . -name "${LAMBDA_ENTRY_FILE}"); do
            dir=$(dirname "${entry}")
            echo "Checking Python syntax in ${dir}..."
            python -m py_compile $(find "${dir}" -name "*.py")
          done

  package:
    runs-on: ubuntu-latest
    needs: syntax_check
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed Lambda directories
        id: changes
        run: |
          LAMBDA_DIRS=$(find . -name "${LAMBDA_ENTRY_FILE}" -exec dirname {} \; | sed 's|^\./||')
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "比較対象の前回コミットがないため、全Lambdaディレクトリを対象にします。"
            CHANGED_DIRS="${LAMBDA_DIRS}"
          else
            CHANGED_DIRS=""
            for dir in ${LAMBDA_DIRS}; do
              if [ -n "$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "${dir}")" ]; then
                CHANGED_DIRS="${CHANGED_DIRS} ${dir}"
              fi
            done
          fi
          if [ -z "${CHANGED_DIRS}" ]; then
            echo "Lambdaディレクトリに変更がないため、パッケージをスキップします。"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "CHANGED_DIRS<<EOF" >> "$GITHUB_ENV"
            echo "${CHANGED_DIRS}" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi
      - name: Zip changed Lambda packages
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p "${DIST_DIR}"
          DIST_DIR_ABS="$(pwd)/${DIST_DIR}"
          for dir in ${CHANGED_DIRS}; do
            name=$(basename "${dir}")
            echo "Packaging ${dir} into ${DIST_DIR}/${name}.zip..."
            (cd "${dir}" && zip -r "${DIST_DIR_ABS}/${name}.zip" .)
          done
      - uses: actions/upload-artifact@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          name: lambda-package
          path: ${{ env.DIST_DIR }}/
          retention-days: 1

  deploy_to_s3:
    runs-on: ubuntu-latest
    needs: package
    if: needs.package.outputs.changed == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: ${{ env.DIST_DIR }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Upload to S3
        run: |
          for f in "${DIST_DIR}"/*.zip; do
            name=$(basename "${f}")
            echo "Uploading ${name} to s3://${S3_BUCKET}/${S3_PREFIX}${name}..."
            aws s3 cp "${f}" "s3://${S3_BUCKET}/${S3_PREFIX}${name}"
          done
